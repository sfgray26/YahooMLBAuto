# Railway Service Configuration
# This defines all services for the CBB Edge Analyzer deployment

# ============================================================================
# API Service - HTTP API
# ============================================================================
[[services]]
name = "api"

[services.build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[services.deploy]
startCommand = "node apps/api/dist/server.js"
numReplicas = 1
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[services.deploy.resources]
memory = "512Mi"

[services.environment]
NODE_ENV = "production"
PORT = "3000"
LOG_LEVEL = "info"
SERVICE_NAME = "api"

# ============================================================================
# Worker Service - Background job processor
# ============================================================================
[[services]]
name = "worker"

[services.build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[services.deploy]
startCommand = "node apps/worker/dist/worker.js"
numReplicas = 1
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[services.deploy.resources]
memory = "1Gi"

[services.environment]
NODE_ENV = "production"
LOG_LEVEL = "info"
WORKER_CONCURRENCY = "5"
SERVICE_NAME = "worker"

# ============================================================================
# Scheduler Service - Cron job runner (placeholder)
# ============================================================================
[[services]]
name = "scheduler"

[services.build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[services.deploy]
startCommand = "node apps/worker/dist/scheduler.js"

[services.schedule]
cron = "*/15 * * * *"

[services.deploy.resources]
memory = "512Mi"

[services.environment]
NODE_ENV = "production"
LOG_LEVEL = "info"
SERVICE_NAME = "scheduler"

# ============================================================================
# Data Ingestion Scheduler - Daily game log fetch from balldontlie
# ============================================================================
[[services]]
name = "scheduler-balldontlie-ingest"

[services.build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[services.deploy]
startCommand = "npx tsx scripts/ingest-balldontlie.ts --verbose"

[services.schedule]
cron = "0 6 * * *"  # Daily at 6 AM

[services.deploy.resources]
memory = "512Mi"

[services.environment]
NODE_ENV = "production"
LOG_LEVEL = "info"
SERVICE_NAME = "scheduler-balldontlie-ingest"

# ============================================================================
# Derived Stats Scheduler - Daily 7/14/30 computation
# ============================================================================
[[services]]
name = "scheduler-derived-stats"

[services.build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[services.deploy]
startCommand = "npx tsx scripts/compute-derived-stats.ts --verbose"

[services.schedule]
cron = "0 7 * * *"  # Daily at 7 AM (after ingestion)

[services.deploy.resources]
memory = "512Mi"

[services.environment]
NODE_ENV = "production"
LOG_LEVEL = "info"
SERVICE_NAME = "scheduler-derived-stats"

# ============================================================================
# Migration Job (runs on deploy)
# ============================================================================
[[services]]
name = "db-migrate"

[services.build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[services.deploy]
startCommand = "cd packages/infrastructure && npx prisma migrate deploy"
